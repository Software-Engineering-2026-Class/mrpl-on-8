version: "3.8"

services:
  agento:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agento-app
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/.venv
    working_dir: /app
    command: python -m src.crewai.run
    # Uncomment to run interactively:
    # stdin_open: true
    # tty: true
    # command: /bin/bash

  # Development service with hot reload
  agento-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agento-dev
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - .:/app
      - /app/__pycache__
    working_dir: /app
    stdin_open: true
    tty: true
    command: /bin/bash
