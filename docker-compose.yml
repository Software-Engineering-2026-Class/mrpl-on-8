
services:
  agento:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agento-app
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      # - ./src:/app/src         # Only mount src for development
      # - ./src/crewai:/app/src/crewai
      # - ./generated_kg:/app/generated_kg
      - output_files:/app/output_files
      # - /app/__pycache__
    working_dir: /app
    # No port mappings are required for this CLI application.
    # If a web server UI is added later, map ports here (e.g. ports: ["8080:8080"])
    command: python -m src.crewai.run
    # Uncomment to run interactively:
    # stdin_open: true
    # tty: true
    # command: /bin/bash

  # Development service with hot reload
  agento-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agento-dev
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - .:/app
      - /app/__pycache__
    working_dir: /app
    stdin_open: true
    tty: true
    command: /bin/bash

volumes:
  output_files:
    driver: local
  # NOTE: removed nested `output_crewai` volume to avoid nested mounts
  # which can make directories appear as busy devices. Use the
  # `output_files` volume and create subdirectories inside the container.
